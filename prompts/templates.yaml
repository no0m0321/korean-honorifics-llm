# 프롬프트 템플릿 54종 (6단계 × 3패러프레이즈 × 3태스크)
# 논문 초안 부록 A와 동일 — 수정 시 논문도 함께 수정할 것
# 설계 원칙: 명제 내용·출력 형식 지시 고정, 종결어미·지시 표현만 변형

levels:
  1: 해라체
  2: 해체
  3: 하게체
  4: 하오체
  5: 해요체
  6: 하십시오체

input_blocks:
  nsmc: "리뷰: {document}"
  copa: "전제: {premise}\n질문 유형: {question}\n선택지 1: {alternative_1}\n선택지 2: {alternative_2}"
  summ: "기사:\n{document}"

max_tokens:
  nsmc: 64
  copa: 64
  summ: 300

